# Full stack: RabbitMQ + main.py (EventSub → RabbitMQ + WebSocket).
# Copy env.compose.example → .env.compose and set TWITCH_CLIENT_ID / TWITCH_CLIENT_SECRET.

networks:
  stream_tools:
    driver: bridge

services:
  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    networks:
      - stream_tools
    ports:
      - "0.0.0.0:5672:5672" # AMQP
      - "0.0.0.0:15672:15672" # RMQ UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/10-docker-compat.conf:/etc/rabbitmq/conf.d/10-docker-compat.conf:ro
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  twitch_eventsub:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - stream_tools
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      # Explicit host IP so other machines (e.g. a laptop) can reach the Pi over LAN.
      - "0.0.0.0:4343:4343" # OAuth callback
      - "0.0.0.0:8765:8765" # WebSocket server
    volumes:
      - ./config/docker:/app/config:ro
      - ./tokens.sqlite:/app/tokens.sqlite
      - ./logs:/app/logs
    env_file:
      - .env.compose
    stdin_open: true
    tty: true
    command:
      ["python", "main.py", "--use-rabbitmq", "--use-websockets"]

volumes:
  rabbitmq_data:
